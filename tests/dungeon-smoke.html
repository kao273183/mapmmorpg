<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<base href="../">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dungeon D1 Smoke Test</title>
<link rel="stylesheet" href="style.css?v=0.29.2">
</head>
<body>
<canvas id="cv" width="960" height="540"></canvas>
<div id="hint">Dungeon D1 Smoke Test</div>
<script src="tiles.js?v=1"></script>
<script src="items.js?v=1"></script>
<script src="dungeon-data.js?v=0.29.2"></script>
<script src="dungeon-bosses.js?v=0.29.2"></script>
<script src="dungeon-balance.js?v=0.29.2"></script>
<script src="dungeon.js?v=0.29.2"></script>
<script src="dungeon-hazards.js?v=0.29.2"></script>
<script src="dungeon-events.js?v=0.29.2"></script>
<script src="dungeon-trials.js?v=0.29.2"></script>
<script src="dungeon-ui.js?v=0.29.2"></script>
<script src="game.js?v=0.29.2"></script>
<script>
const smokeParams = new URLSearchParams(location.search);
const mode = smokeParams.get('mode') || 'route';
if (smokeParams.get('class') === 'mage') chosenCls = 'mage';
resetRun();
function openFixedEvent(eventId, options) {
  const def = DUNGEON_EVENT_DEFS[eventId];
  const atFloor = (def.minChapter || 1) >= 2 ? 7 : 3;
  const type = def.family === 'chest' ? 'treasure' : 'event';
  const spec = makeRoomSpec(type, atFloor, 0);
  spec.eventId = eventId;
  spec.hazardId = eventId === 'hazard_trial' ? dungeonBiomeDef(atFloor).hazardId : null;
  spec.threat = Math.max(DUNGEON_ROOM_DEFS[type].threat, def.threat || 0);
  spec.rewardTags = def.rewards.slice();
  enterDungeonRoom(spec);
  mons.length = 0;
  completeDungeonRoom();
  if (options && options.insufficient === 'souls') soulsRun = 0;
  if (options && options.insufficient === 'hp') player.hp = Math.round(player.mhp * 0.2);
  player.x = floorEvent.x; player.y = floorEvent.y;
  openFloorEvent();
}
function resolveFixedTrial(outcome) {
  if (outcome === 'declined') { chooseFloorEvent(1); return; }
  chooseFloorEvent(0);
  if (outcome === 'wave2') {
    for (const m of mons.filter(mon => mon.trialMon)) recordDungeonTrialEnemyDefeat(floorTrial);
    mons = mons.filter(mon => !mon.trialMon);
    updateFloorTrial(0);
    return;
  }
  if ((outcome === 'failed' || outcome === 'failed-clear') && floorTrial.type === 'timed') { floorTrial.timeLeft = 1; updateFloorTrial(1); }
  if ((outcome === 'failed' || outcome === 'failed-clear') && floorTrial.type === 'flawless') recordFloorTrialDamage(1);
  if (outcome === 'failed-clear') { mons = []; completeDungeonRoom(); return; }
  if (outcome === 'failed') return;
  if (outcome !== 'success') return;
  for (let guard = 0; guard < 3 && floorTrial.status === 'active'; guard++) {
    for (const m of mons.filter(mon => mon.trialMon)) recordDungeonTrialEnemyDefeat(floorTrial);
    mons = mons.filter(mon => !mon.trialMon);
    if (floorTrial.type === 'hazard') player.x = floorTrial.targetX;
    updateFloorTrial(0);
  }
}
if (mode.startsWith('boss-')) {
  const bossFloors = { meadow:5, cavern:10, volcano:15, tundra:20, void:25 };
  const bossParts = mode.slice(5).split('-');
  const bossKey = bossParts[0], bossVariant = bossParts.slice(1).join('-');
  const bossFloor = bossFloors[bossKey] || 5;
  enterDungeonRoom(makeRoomSpec('boss', bossFloor, 0));
  const boss = mons.find(mon => mon.type === 'boss');
  if (boss && bossKey === 'meadow' && bossVariant) {
    floorT = 0; boss.x = 720; boss.targetX = 720; boss.atkT = 9999;
    if (bossVariant === 'root' || bossVariant === 'root-active' || bossVariant === 'thorns' || bossVariant === 'lowfx') {
      if (bossVariant === 'lowfx') { combatSettings.flashes = false; combatSettings.shake = 0; combatSettings.numbers = 'compact'; }
      if (bossVariant === 'thorns') boss.phase = 2;
      startDungeonBossSpecialAttack(boss, player, 'root_sweep'); boss.specialAttack.timer = 9999;
      if (bossVariant === 'root-active' || bossVariant === 'lowfx') for (const effect of dungeonBossEffects) { effect.state = 'active'; effect.timer = 9999; }
      if (bossVariant === 'thorns') for (const effect of dungeonBossEffects) { effect.state = 'thorns'; effect.timer = 9999; }
    } else if (bossVariant === 'seed' || bossVariant === 'seed-active') {
      boss.phase = 2; startDungeonBossSpecialAttack(boss, player, 'seed_burst');
      if (bossVariant === 'seed') boss.specialAttack.timer = 9999;
      else { boss.specialAttack.timer = 1; updateDungeonBossSpecialAttack(boss, player); boss.atkT = 9999; }
    }
  } else if (boss && bossKey === 'cavern' && bossVariant) {
    floorT = 0; boss.x = 720; boss.targetX = 720; boss.atkT = 9999;
    if (bossVariant === 'rock' || bossVariant === 'rock-active' || bossVariant === 'lowfx') {
      if (bossVariant === 'lowfx') { combatSettings.flashes = false; combatSettings.shake = 0; combatSettings.numbers = 'compact'; }
      boss.phase = bossVariant === 'rock' ? 1 : 2;
      startDungeonBossSpecialAttack(boss, player, 'marked_rockfall'); boss.specialAttack.timer = 9999;
      if (bossVariant === 'rock-active' || bossVariant === 'lowfx') for (const effect of dungeonBossEffects) { effect.state = 'active'; effect.timer = 2; }
    } else if (bossVariant === 'wave' || bossVariant === 'wave-active') {
      boss.phase = 2; startDungeonBossSpecialAttack(boss, player, 'cavern_shockwave');
      if (bossVariant === 'wave') boss.specialAttack.timer = 9999;
      else { boss.specialAttack.timer = 1; updateDungeonBossSpecialAttack(boss, player); boss.atkT = 9999; }
    }
  }
  const ok = !!boss && boss.bossId === dungeonBossDefForFloor(bossFloor).id && boss.floor === bossFloor;
  window.__dungeonSmokeResult = { ok, bossId:boss && boss.bossId, floor:bossFloor, phase:boss && boss.phase, variant:bossVariant || 'default' };
  document.title = ok ? 'Dungeon Boss PASS ' + bossKey + (bossVariant ? ' ' + bossVariant : '') : 'Dungeon Boss FAIL ' + bossKey;
  document.getElementById('hint').textContent = JSON.stringify(window.__dungeonSmokeResult);
} else if (mode.startsWith('trial-')) {
  const trialModes = {
    'elite':'elite_ambush', 'elite-success':'elite_ambush', 'elite-declined':'elite_ambush',
    'timed':'timed_clear', 'timed-wave2':'timed_clear', 'timed-success':'timed_clear', 'timed-failed':'timed_clear', 'timed-failed-clear':'timed_clear',
    'flawless':'flawless_wave', 'flawless-success':'flawless_wave', 'flawless-failed':'flawless_wave', 'flawless-failed-clear':'flawless_wave',
    'hazard':'hazard_trial', 'hazard-success':'hazard_trial', 'hazard-declined':'hazard_trial'
  };
  const trialMode = mode.slice(6);
  openFixedEvent(trialModes[trialMode]);
  resolveFixedTrial(trialMode === 'timed-wave2' ? 'wave2' : trialMode.endsWith('-failed-clear') ? 'failed-clear' : trialMode.endsWith('-success') ? 'success' : trialMode.endsWith('-failed') ? 'failed' : trialMode.endsWith('-declined') ? 'declined' : 'active');
} else if (mode.startsWith('event-')) {
  const eventMode = mode.slice(6);
  const aliases = { 'sealed-insufficient':'sealed_chest', 'blood-insufficient':'blood_blessing', 'fate-reroll':'fate_altar' };
  const eventId = aliases[eventMode] || eventMode;
  openFixedEvent(eventId, {
    insufficient:eventMode === 'sealed-insufficient' ? 'souls' : eventMode === 'blood-insufficient' ? 'hp' : null
  });
  if (eventMode === 'fate-reroll') {
    chooseFloorEvent(0);
    pendingPicks = 1;
    rollPick();
  }
} else if (mode === 'route') {
  mons.length = 0;
  completeDungeonRoom();
  openRouteSelection();
} else if (mode === 'route-d2a') {
  dungeonRun.choices = [makeRoomSpec('hazard', 2, 0), makeRoomSpec('event', 2, 1)];
  routePanel = { choices:dungeonRun.choices };
  portal = null;
} else if (mode === 'route-trial-hazard') {
  const trialSpec = makeRoomSpec('event', 7, 0);
  trialSpec.eventId = 'hazard_trial';
  trialSpec.hazardId = dungeonBiomeDef(7).hazardId;
  trialSpec.threat = 3;
  trialSpec.rewardTags = DUNGEON_EVENT_DEFS.hazard_trial.rewards.slice();
  dungeonRun.choices = [trialSpec, makeRoomSpec('safe', 7, 1)];
  routePanel = { choices:dungeonRun.choices };
  portal = null;
} else if (mode === 'hazard') {
  enterDungeonRoom(makeRoomSpec('hazard', 2, 0));
} else if (mode === 'hazard-active') {
  enterDungeonRoom(makeRoomSpec('hazard', 2, 0));
  for (const hazard of dungeonHazards) { hazard.phase = 'active'; hazard.timer = 9999; }
} else if (mode === 'hazard-hit') {
  enterDungeonRoom(makeRoomSpec('hazard', 2, 0));
  const hazard = dungeonHazards[0];
  hazard.phase = 'active'; hazard.timer = 9999;
  player.x = hazard.x; player.y = hazard.y; player.inv = 0;
} else if (mode === 'hazard-cave') {
  enterDungeonRoom(makeRoomSpec('hazard', 7, 0));
} else if (mode === 'hazard-cave-active') {
  enterDungeonRoom(makeRoomSpec('hazard', 7, 0));
  for (const hazard of dungeonHazards) { hazard.phase = 'active'; hazard.timer = 16; }
} else if (mode === 'hazard-lava') {
  enterDungeonRoom(makeRoomSpec('hazard', 12, 0));
  for (const hazard of dungeonHazards) { hazard.phase = 'active'; hazard.timer = 9999; }
} else if (mode === 'hazard-ice') {
  enterDungeonRoom(makeRoomSpec('hazard', 17, 0));
} else if (mode === 'hazard-void') {
  enterDungeonRoom(makeRoomSpec('hazard', 22, 0));
  mons.length = 0;
  spawnDungeonHazards(currentRoomSpec, worldW, null, plats);
  for (const hazard of dungeonHazards) { hazard.phase = 'warning'; hazard.timer = 9999; }
} else if (mode === 'hazard-void-gone') {
  enterDungeonRoom(makeRoomSpec('hazard', 22, 0));
  mons.length = 0;
  spawnDungeonHazards(currentRoomSpec, worldW, null, plats);
  for (const hazard of dungeonHazards) { hazard.phase = 'gone'; hazard.timer = 9999; hazard.platform.voidDisabled = true; }
} else if (mode === 'hazard-lowfx') {
  combatSettings.flashes = false;
  combatSettings.shake = 0;
  combatSettings.numbers = 'compact';
  enterDungeonRoom(makeRoomSpec('hazard', 12, 0));
  for (const hazard of dungeonHazards) { hazard.phase = 'warning'; hazard.timer = 20; }
} else if (mode === 'camp') {
  enterDungeonRoom(makeRoomSpec('camp', 4, 0));
} else if (mode === 'treasure') {
  enterDungeonRoom(makeRoomSpec('treasure', 3, 0));
} else if (mode === 'chapter') {
  enterDungeonRoom(makeRoomSpec('boss', 5, 0));
  mons.length = 0;
  dungeonRun.explorationScore = 6;
  completeDungeonRoom();
  openChapterSummary();
} else if (mode === 'result-death' || mode === 'result-extract') {
  const extracted = mode === 'result-extract';
  floor = 7; kills = 4; soulsRun = 12;
  meta.souls = 100; meta.up.soul = 0; meta.stash = []; meta.mats = { enh:7, ench:5, set:3 };
  bestFloor = 3;
  player.items = [genGear(floor, 1)];
  lastDamageSource = extracted ? '成功撤退' : '落石區';
  endRun(extracted ? 'extract' : 'death');
  const ok = gameState === 'dead' && lastRun.result === (extracted ? 'extract' : 'death') && lastRun.gained === 12 &&
    meta.souls === 112 && meta.stash.length === 1 && meta.mats.enh === 7 && meta.mats.ench === 5 && meta.mats.set === 3 && bestFloor === 7;
  window.__dungeonSmokeResult = { ok, result:lastRun.result, gained:lastRun.gained, stashed:lastRun.stashed, souls:meta.souls, mats:meta.mats, bestFloor, cause:lastRun.cause };
  document.title = ok ? 'Dungeon Result PASS ' + lastRun.result : 'Dungeon Result FAIL ' + lastRun.result;
  document.getElementById('hint').textContent = JSON.stringify(window.__dungeonSmokeResult);
} else if (mode === 'settings-updates') {
  openTownPanel('save');
  settingsPage = 'updates';
  settingsUpdateIndex = 0;
  document.title = 'Dungeon Settings Updates';
} else if (mode === 'settings-boss-balance') {
  const bossNow = Date.now();
  const bossSample = createDungeonBoss(dungeonBossDef('meadow_lord'), 5, 1);
  recordDungeonBossStart(bossSample, bossNow);
  recordDungeonBossPhase(3);
  recordDungeonBossEnd('kill', null, bossNow + 72000);
  finishDungeonBalanceRun({ result:'extract', floor:5, kills:1, gained:8 }, bossNow + 80000);
  openTownPanel('save');
  settingsPage = 'balance';
  document.title = 'Dungeon Settings Boss Balance';
} else if (mode === 'settings-balance') {
  recordDungeonRouteOffer([makeRoomSpec('safe', 2, 0), makeRoomSpec('hazard', 2, 1)]);
  recordDungeonRouteChoice(makeRoomSpec('hazard', 2, 1));
  recordDungeonDamage('熔岩噴口', 18);
  recordDungeonTrialResult('success');
  finishDungeonBalanceRun({ result:'extract', floor:7, kills:12, gained:36 }, Date.now() + 600000);
  openTownPanel('save');
  settingsPage = 'balance';
  document.title = 'Dungeon Settings Balance';
} else if (mode === 'settings-benchmark') {
  openTownPanel('save');
  settingsPage = 'benchmark';
  settingsBenchmarkIndex = 3;
  document.title = 'Dungeon Settings Benchmark';
} else if (mode === 'settings-benchmark-report') {
  const profile = dungeonBenchmarkProfile('mage-chapter2');
  startDungeonBalanceRun(profile.seed, profile.classId, Date.now(), { mode:'benchmark', benchmarkId:profile.id, benchmarkLabel:profile.label });
  recordDungeonRouteOffer([makeRoomSpec('safe', 2, 0), makeRoomSpec('hazard', 2, 1)]);
  recordDungeonRouteChoice(makeRoomSpec('hazard', 2, 1));
  recordDungeonDamage('落石區', 24);
  finishDungeonBalanceRun({ result:'extract', floor:10, kills:20, gained:40 }, Date.now() + 900000);
  openTownPanel('save');
  settingsPage = 'balance';
  settingsBalanceMode = 'benchmark';
  document.title = 'Dungeon Settings Benchmark Report';
} else if (mode === 'benchmark-run') {
  meta.souls = 77; meta.mats = { enh:5, ench:4, set:3 }; meta.stash = []; bestFloor = 6;
  const before = JSON.stringify({ souls:meta.souls, mats:meta.mats, stash:meta.stash, bestFloor });
  const started = startDungeonBenchmarkRun('mage-chapter2');
  const profile = dungeonBenchmarkProfile('mage-chapter2');
  const fixedGear = started && player.cls === 'mage' && activeDungeonBenchmarkId === profile.id && dungeonRun.seed === profile.seed && player.items.length === 5 && player.items.every(item => item.benchmark);
  meta.souls = 999; meta.mats.enh = 999; floor = 10; kills = 20; soulsRun = 40;
  endRun('extract');
  const after = JSON.stringify({ souls:meta.souls, mats:meta.mats, stash:meta.stash, bestFloor });
  const ok = fixedGear && before === after && lastRun.benchmarkId === profile.id && dungeonBalanceReport('benchmark').summary.runs >= 1;
  window.__dungeonSmokeResult = { ok, fixedGear, restored:before === after, benchmarkId:lastRun.benchmarkId };
  document.title = ok ? 'Dungeon Benchmark Run PASS' : 'Dungeon Benchmark Run FAIL';
  document.getElementById('hint').textContent = JSON.stringify(window.__dungeonSmokeResult);
} else if (mode === 'validate') {
  const issues = [];
  for (let seed = 1; seed <= 1000; seed++) {
    dungeonRun.seed = seed;
    dungeonRun.roomHistory = ['safe'];
    dungeonRun.chapterUsed = { camp:false, treasure:false };
    player.hp = player.mhp;
    for (let atFloor = 2; atFloor <= 4; atFloor++) {
      const choices = generateRouteChoices(atFloor);
      if (choices.length !== 2 || choices[0].type === choices[1].type) issues.push('duplicate:' + seed + ':' + atFloor);
      if (atFloor === 4 && !choices.some(c => ['safe', 'camp', 'treasure'].includes(c.type))) issues.push('unsafe:' + seed);
      const chosen = choices[seed % 2];
      dungeonRun.roomHistory.push(chosen.type);
      if (chosen.type === 'camp') dungeonRun.chapterUsed.camp = true;
      if (chosen.type === 'treasure') dungeonRun.chapterUsed.treasure = true;
    }
  }
  window.__dungeonSmokeResult = { seeds:1000, issues:issues.slice(0, 20), issueCount:issues.length };
  document.title = issues.length ? 'Dungeon D1 Validate FAIL ' + issues.length : 'Dungeon D1 Validate PASS 1000';
  document.getElementById('hint').textContent = JSON.stringify(window.__dungeonSmokeResult);
}
</script>
</body>
</html>
