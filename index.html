<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#14162b">
<meta name="mobile-web-app-capable" content="yes">

<title>像素地城 — Roguelite 橫向捲軸</title>
<link rel="stylesheet" href="style.css?v=0.29.1">

<body>
<div id="rotatePrompt" role="dialog" aria-label="需要橫向顯示">
  <div class="rotate-card">
    <div class="rotate-phone" aria-hidden="true"></div>
    <h1>請將手機橫放</h1>
    <p>像素地城使用橫向戰鬥介面，橫放後會自動調整畫面與觸控按鈕。</p>
    <button id="landscapeButton" type="button">進入橫向全螢幕</button>
    <p id="landscapeStatus" aria-live="polite"></p>
  </div>
</div>
<canvas id="cv" width="960" height="540"></canvas>
<div id="hint">[1]/[2] 選職業&nbsp;|&nbsp;點擊購買永久強化&nbsp;|&nbsp;Enter 開始冒險</div>

<script src="game.js?v=0.29.1"></script>
